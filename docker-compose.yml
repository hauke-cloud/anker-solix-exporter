version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=anker_exporter
      - POSTGRES_PASSWORD=anker_exporter_password
      - POSTGRES_DB=anker_solix
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anker_exporter"]
      interval: 10s
      timeout: 5s
      retries: 5

  anker-solix-exporter:
    build: .
    container_name: anker-solix-exporter
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      - ANKER_EMAIL=${ANKER_EMAIL}
      - ANKER_PASSWORD=${ANKER_PASSWORD}
      - ANKER_COUNTRY=DE
      - ANKER_POLL_INTERVAL=5m
      - DB_HOST=timescaledb
      - DB_PORT=5432
      - DB_USER=anker_exporter
      - DB_PASSWORD=anker_exporter_password
      - DB_NAME=anker_solix
      - DB_SSLMODE=disable
      - DB_MIGRATIONS_PATH=/etc/anker-solix-exporter/migrations
      # Optional: Uncomment for certificate-based authentication
      # - DB_SSLCERT=/certs/client-cert.pem
      # - DB_SSLKEY=/certs/client-key.pem
      # - DB_SSLROOTCERT=/certs/ca-cert.pem
      - LOG_LEVEL=info
      - RESUME_FILE=/data/last_export.json
    volumes:
      - exporter-data:/data
      # Optional: Uncomment to mount certificates
      # - ./certs:/certs:ro
    restart: unless-stopped
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - timescaledb
    networks:
      - monitoring

volumes:
  timescaledb-data:
  exporter-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
