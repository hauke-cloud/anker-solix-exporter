name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run unit tests
        run: |
          go test -v -race -short -coverprofile=coverage-unit.out ./...
        env:
          CGO_ENABLED: 1

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run integration tests
        run: |
          go test -v -race -coverprofile=coverage-integration.out ./...
        env:
          CGO_ENABLED: 1

  build:
    name: Build and Push
    runs-on: github-arc-scaleset-kaniko
    needs: [test, test-integration]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: arm
            variant: v7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build version info
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "COMMIT=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Prepare platform info
        id: platform
        run: |
          PLATFORM="${{ matrix.platform.os }}/${{ matrix.platform.arch }}"
          if [ -n "${{ matrix.platform.variant }}" ]; then
            PLATFORM="${PLATFORM}/${{ matrix.platform.variant }}"
            TAG_SUFFIX="${{ matrix.platform.os }}-${{ matrix.platform.arch }}-${{ matrix.platform.variant }}"
          else
            TAG_SUFFIX="${{ matrix.platform.os }}-${{ matrix.platform.arch }}"
          fi
          echo "platform=${PLATFORM}" >> $GITHUB_OUTPUT
          echo "tag_suffix=${TAG_SUFFIX}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Prepare tags for build
        id: tags
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          DESTINATION_ARGS=""
          for tag in $TAGS; do
            DESTINATION_ARGS="${DESTINATION_ARGS} --destination=${tag}-${{ steps.platform.outputs.tag_suffix }}"
          done
          echo "destinations=${DESTINATION_ARGS}" >> $GITHUB_OUTPUT

      - name: Build and push with Kaniko
        run: |
          kaniko \
            --context=${{ github.workspace }} \
            --dockerfile=${{ github.workspace }}/Dockerfile \
            ${{ steps.tags.outputs.destinations }} \
            --build-arg=VERSION=${{ steps.version.outputs.VERSION }} \
            --build-arg=COMMIT=${{ steps.version.outputs.COMMIT }} \
            --build-arg=DATE=${{ steps.version.outputs.DATE }} \
            --custom-platform=${{ steps.platform.outputs.platform }} \
            --snapshot-mode=redo \
            --compressed-caching=false \
            --cache=true \
            --cache-repo=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cache \
            ${{ github.event_name == 'pull_request' && '--no-push' || '' }}

  create-manifest:
    name: Create Multi-Arch Manifest
    runs-on: github-arc-scaleset-kaniko
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Install regctl
        run: |
          curl -L https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 -o regctl
          chmod +x regctl
          sudo mv regctl /usr/local/bin/

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Create and push manifest
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          for tag in $TAGS; do
            regctl manifest create "$tag" \
              "${tag}-linux-amd64" \
              "${tag}-linux-arm64" \
              "${tag}-linux-arm-v7"
          done

  helm:
    name: Build and Push Helm Chart
    runs-on: github-arc-scaleset-kaniko
    needs: create-manifest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Log in to Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update Chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.VERSION }}/" deployments/helm/anker-solix-exporter/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.VERSION }}\"/" deployments/helm/anker-solix-exporter/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package deployments/helm/anker-solix-exporter

      - name: Push Helm chart
        run: |
          helm push anker-solix-exporter-${{ steps.version.outputs.VERSION }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  release:
    name: Create Release
    runs-on: github-arc-scaleset-kaniko
    needs: [create-manifest, helm]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Changes" > changelog.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: changelog.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
